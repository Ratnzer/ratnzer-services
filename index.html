<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png">
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="description" content="Ratnzer Services App">
    <title>خدمات راتنزر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Pi Network SDK (يتم تحميله ديناميكياً حسب البيئة) -->
    <script id="pi-sdk-script"></script>
    <script>
      // تحديد رابط Pi SDK حسب البيئة
      const isSandbox = (new URLSearchParams(window.location.search).get('sandbox') === 'true') || 
                        (localStorage.getItem('RATNZER_SANDBOX') === 'true') ||
                        (process.env.REACT_APP_SANDBOX === 'true');
      
      const piSdkUrl = isSandbox 
        ? 'https://sandbox.minepi.com/pi-sdk.js'
        : 'https://sdk.minepi.com/pi-sdk.js';
      
      // تحميل Pi SDK
      const script = document.getElementById('pi-sdk-script');
      script.src = piSdkUrl;
      script.async = true;
      
      console.log(`📱 تحميل Pi SDK من: ${piSdkUrl}`);
    </script>
    <style>
      html, body, #root {
        background-color: #000000 !important;
        color: #ffffff;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body class="bg-black">
    <div id="root"></div>
    <!-- تم إزالة importmap الخارجي لضمان التحميل من الملفات المحلية بعد البناء -->
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
